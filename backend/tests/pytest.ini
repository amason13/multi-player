[pytest]
# Pytest configuration for multi-player tests

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Minimum Python version
minversion = 7.0

# Test output options
addopts = 
    -v
    --strict-markers
    --tb=short
    --disable-warnings
    -ra

# Markers for test categorization
markers =
    unit: Unit tests
    integration: Integration tests
    models: Tests for entity models
    repositories: Tests for repository classes
    handlers: Tests for Lambda handlers
    exceptions: Tests for exception handling
    responses: Tests for response formatting
    slow: Slow running tests
    dynamodb: Tests that use DynamoDB
    cognito: Tests that use Cognito

# Coverage options
[coverage:run]
source = src/layers/common/python
omit = 
    */tests/*
    */site-packages/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod
